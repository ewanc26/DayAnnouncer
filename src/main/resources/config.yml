# DayAnnouncer configuration
config-version: 1

# Master toggle to enable/disable all announcements.
enabled: true

# Per-world settings. Each key is a world name.
# If a world is not listed, no announcements fire for it.
worlds:
  world:
    enabled: true
    # Single message (string) or multiple messages (list).
    # When multiple messages are defined, one is chosen at random each dawn.
    message: "<yellow>It's {time}! Day {day}</yellow>"
    # messages:
    #   - "<yellow>It's {time}! Day {day}</yellow>"
    #   # Placeholders: {day}, {time}, {time-name}, {world}, {players}, {max-players}
    # Check interval in ticks (20 ticks = 1 second).
    check-interval: 20
    # Tick window after dawn (time 0) during which the announcement fires.
    # Must be >= check-interval to guarantee detection. Range 1-23999.
    dawn-threshold: 20
    # Per-world output overrides. Omit to inherit the global defaults below.
    # output:
    #   chat: true
    #   action-bar: false
    #   title: false
    #   boss-bar: false
    # Per-world sound. Omit to inherit the global default below.
    # sound: "entity.experience_orb.pickup"

# Default output channels — used when a world doesn't define its own.
# Can all be enabled simultaneously.
output:
  chat: true
  action-bar: false
  title: false
  boss-bar: false

# Default sound played to every player when an announcement fires.
# Set to '' or omit to disable. Uses Bukkit sound names.
# Per-world sound can override this.
sound: ""
